name: Build Player Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Update tournament context
        run: python scripts/update_tournament_context.py

      - name: Test ATP scraping access
        run: python scripts/test_atp_scrape_access.py
      
      - name: Fetch ATP live results
        run: python scripts/fetch_atp_live_results.py
      
      - name: Import live matches
        run: python scripts/import_live_matches.py
      
      - name: Import historical matches
        run: python scripts/import_historical_matches.py

      - name: Update current tournament results
        run: python scripts/update_current_tournament_results.py
        
      - name: Commit updated data files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/live/tournament_context.json data/raw/historical_matches.json data/raw/imports_live data/live/current_tournament_results.json data/live/players.json
          git commit -m "Update historical matches and player stats" || echo "No changes"
          git pull --rebase origin main || true
          git push
